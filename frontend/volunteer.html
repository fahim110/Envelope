<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Volunteer Mailman | Envelope</title>

    <link rel="stylesheet" href="css/volunteer.css">

</head>

<body>

<div class="container">

    <h1>🚲 Volunteer Mailman</h1>

    <h3>Central Post Office</h3>

    <hr>

    <!-- ====================================== -->
    <!-- Waiting Letters -->
    <!-- ====================================== -->

    <section>

        <h2>

            📮 Waiting at Post Office

            (<span id="waitingCount">0</span>)

        </h2>

        <div id="waitingContainer">

            <p>Loading...</p>

        </div>

    </section>

    <br>

    <hr>

    <br>

    <!-- ====================================== -->
    <!-- Volunteer Bag -->
    <!-- ====================================== -->

    <section>

        <h2>

            🎒 My Mail Bag

            (<span id="bagCount">0</span>/5)

        </h2>

        <div id="bagContainer">

            <p>No claimed letters.</p>

        </div>

    </section>

    <br>

    <hr>

    <br>

    <!-- ====================================== -->
    <!-- QR Scanner -->
    <!-- ====================================== -->

    <section>

        <h2>

            📷 Delivery Scanner

        </h2>

        <div id="reader"
             style="width:320px;margin:auto;"></div>

        <p id="scanStatus">

            Camera idle.

        </p>

    </section>

    <br>

    <button id="logoutBtn">

        Logout

    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script src="js/supabase.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<script src="js/volunteer.js"></script>

</body>

</html>
