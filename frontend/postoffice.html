<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Central Post Office</title>

<link rel="stylesheet" href="css/postoffice.css">

</head>

<body>

<div class="container">

    <h1>📮 Central Post Office</h1>

    <p>

        You are about to deposit the following letter.

    </p>

    <div class="letter-card">

        <h2 id="recipientName">

            Loading...

        </h2>

        <p>

            <b>Title:</b>

            <span id="letterTitle"></span>

        </p>

    </div>

    <button id="startScanner">

        📷 Start Scanner

    </button>

    <div id="reader"></div>

    <p id="status"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script src="js/supabase.js"></script>

<script src="js/postoffice.js"></script>

</body>

</html>
