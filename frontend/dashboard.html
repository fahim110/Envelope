<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Envelope Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="container">

    <h1>✉ Envelope</h1>

    <h2>Central Post Office</h2>

    <p id="welcomeText">Loading...</p>

    <div class="stats">

        <div class="card">

            <h3>🪙 Postal Coins</h3>

            <p id="coins">...</p>

        </div>

        <div class="card">

            <h3>⭐ Reputation</h3>

            <p id="reputation">...</p>

        </div>

        <div class="card">

            <h3>🏢 Current Floor</h3>

            <p id="floor">...</p>

        </div>

    </div>

    <div class="menu">

        <a href="letter.html" class="menuBtn">
            ✉ Write Letter
        </a>

        <button class="menuBtn" disabled>
            📥 Inbox (Coming Soon)
        </button>

        <button class="menuBtn" disabled>
            📤 Sent Letters (Coming Soon)
        </button>

    </div>

    <button id="logoutBtn">
        Logout
    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script src="js/supabase.js"></script>

<script src="js/dashboard.js"></script>

</body>

</html>
