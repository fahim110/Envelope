<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Epistolary Dashboard</title>

    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="container">

    <h1>✉ Epistolary</h1>

    <h2>Central Post Office</h2>

    <hr>

    <h3 id="welcomeText">
        Loading...
    </h3>

    <div class="card">
        <h3>🪙 Postal Coins</h3>
        <p id="coins">...</p>
    </div>

    <div class="card">
        <h3>⭐ Reputation</h3>
        <p id="reputation">...</p>
    </div>

    <div class="card">
        <h3>🏢 Current Floor</h3>
        <p id="floor">...</p>
    </div>

    <button id="logoutBtn">
        Logout
    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script src="js/supabase.js"></script>

<script src="js/dashboard.js"></script>

</body>

</html>
